name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'
        cache-dependency-path: 'frontend/pnpm-lock.yaml'

    - name: Install Pyinstaller and Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r backend/requirements.txt

    - name: Build AuraPresenter
      run: |
        python backend/build.py

    - name: Package Mac App
      if: matrix.os == 'macos-latest'
      run: |
        cd releases
        zip -r AuraPresenter-mac.zip AuraPresenter.app

    - name: Package Windows App
      if: matrix.os == 'windows-latest'
      run: |
        cd releases
        Compress-Archive -Path AuraPresenter -DestinationPath AuraPresenter-windows.zip

    - name: Package Linux App
      if: matrix.os == 'ubuntu-latest'
      run: |
        cd releases
        zip -r AuraPresenter-linux.zip AuraPresenter

    - name: Upload Mac Asset
      if: matrix.os == 'macos-latest'
      uses: softprops/action-gh-release@v1
      with:
        files: releases/AuraPresenter-mac.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Windows Asset
      if: matrix.os == 'windows-latest'
      uses: softprops/action-gh-release@v1
      with:
        files: releases/AuraPresenter-windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Linux Asset
      if: matrix.os == 'ubuntu-latest'
      uses: softprops/action-gh-release@v1
      with:
        files: releases/AuraPresenter-linux.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
